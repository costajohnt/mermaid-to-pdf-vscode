name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Build CLI tool
      run: npm run build

    - name: Verify build output
      run: |
        test -d dist || { echo "Build failed: dist directory not found"; exit 1; }
        test -f dist/cli.js || { echo "Build failed: cli.js not found"; exit 1; }
        echo "Build output verified"
      shell: bash

    - name: Run unit tests
      run: npm run test
      env:
        NODE_ENV: test
      timeout-minutes: 5

    - name: Run e2e tests
      run: npm run test:e2e
      env:
        NODE_ENV: test
      timeout-minutes: 5

    - name: Build MCP server
      run: cd mermaid-to-pdf-mcp && npm install && npm run build

    - name: Run MCP server tests
      run: cd mermaid-to-pdf-mcp && npm test
      timeout-minutes: 2

    - name: Generate test report
      if: always()
      run: |
        echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
        echo "- Node: ${{ matrix.node-version }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check for security vulnerabilities
      run: npm audit --production --audit-level=high

    - name: TypeScript strict check
      run: npx tsc --noEmit --strict

    - name: Verify CLI and MCP server versions match
      run: node scripts/check-versions.js

    - name: Check bundle size
      run: |
        npm run build
        SIZE=$(du -sb dist/ | cut -f1)
        MAX=7000000  # 7 MB
        echo "## Bundle Size" >> "$GITHUB_STEP_SUMMARY"
        echo "- Current: $(echo "$SIZE" | numfmt --to=iec-i)B ($SIZE bytes)" >> "$GITHUB_STEP_SUMMARY"
        echo "- Limit: $(echo "$MAX" | numfmt --to=iec-i)B ($MAX bytes)" >> "$GITHUB_STEP_SUMMARY"
        if [ "$SIZE" -gt "$MAX" ]; then
          echo "::error::Bundle size $SIZE bytes exceeds limit $MAX bytes"
          exit 1
        fi
        echo "Bundle size: $SIZE bytes (limit: $MAX bytes)"

    - name: Run tests with coverage
      run: npm run test:coverage
      env:
        NODE_ENV: test
      timeout-minutes: 5
